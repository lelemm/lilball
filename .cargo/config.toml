# The app can build for Linux and Windows. Linux uses the winit/ash preview
# shell; Windows uses the native Win32 overlay shell (click-through, tray,
# global hotkeys) around the same ash renderer.
#
# `fidget-sim` is platform independent; `fidget-vk` keeps platform shell code
# target-scoped so both native and cross builds stay supported.
#
# Cross-compiling from Linux/WSL uses the mingw linker below plus:
#   rustup target add x86_64-pc-windows-gnu
#   tools/build-windows.sh

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
